name: nlp-captioning
channels:
  - conda-forge
  - defaults

dependencies:
  # ===== Core Python =====
  - python=3.10

  # ===== Data processing =====
  - pandas>=2.0
  - numpy>=1.24
  - openpyxl>=3.1
  - xlsxwriter>=3.1

  # ===== Image handling =====
  - pillow>=10.0
  - poppler           # Required for pdf2image on Windows

  # ===== Utilities =====
  - tqdm>=4.66
  - python-dotenv>=1.0

  # ===== HTTP / API =====
  - requests>=2.31

  # ===== Optional but useful for robustness =====
  - tenacity>=8.2    # retry logic (rate limit Gemini)

  # ===== Jupyter support =====
  - ipykernel>=6.29

  # ===== pip-only packages =====
  - pip
  - pip:
      # Google Gemini SDK (Generative AI)
      - google-generativeai>=0.5.0

      # JSON schema validation (optional but recommended)
      - jsonschema>=4.22
      - matplotlib>=3.8
      - pdf2image>=1.16    # Convert PDF to images